<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Register</title>

<!-- LINK CSS -->
<link rel="stylesheet" href="login.css">
</head>
<body>

<!-- Login Form -->
<div id="loginSection">
    <h1>Login</h1>
    <form id="loginForm">
        <label>Username:</label><br>
        <input type="text" id="loginUsername" name="username" required><br>
        <label>Password:</label><br>
        <input type="password" id="loginPassword" name="password" required><br><br>
        <button type="submit">Login</button>
    </form>
    <br>
    <button onclick="showRegister()">Go to Register</button>
</div>

<!-- Register Form -->
<div id="registerSection" style="display:none;">
    <h1>Register</h1>
    <form id="registerForm">
        <label>Username:</label><br>
        <input type="text" id="regUsername" name="username" required><br>
        <label>Password:</label><br>
        <input type="password" id="regPassword" name="password" required><br>
        <label>CP Number:</label><br>
        <input type="text" id="regCP" name="cp" required><br><br>
        <button type="submit">Register</button>
    </form>
    <br>
    <button onclick="showLogin()">Back to Login</button>
</div>

<p id="msg"></p>

<script>
function showRegister() {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("registerSection").style.display = "block";
}

function showLogin() {
    document.getElementById("registerSection").style.display = "none";
    document.getElementById("loginSection").style.display = "block";
}

// Handle registration
document.getElementById('registerForm').addEventListener('submit', function(e){
    e.preventDefault();

    const formData = new FormData();
    formData.append('username', document.getElementById('regUsername').value);
    formData.append('password', document.getElementById('regPassword').value);
    formData.append('cp', document.getElementById('regCP').value);

    fetch('register.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('msg').innerText = data.message;
        if(data.status === 'success'){
            setTimeout(() => { showLogin(); }, 1000);
        }
    });
});

// Handle login
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();

    const formData = new FormData();
    formData.append('username', document.getElementById('loginUsername').value);
    formData.append('password', document.getElementById('loginPassword').value);

    fetch('login.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('msg').innerText = data.message;
        if(data.status === 'success'){
            window.location.href = 'dashboard.php';
        }
    });
});
</script>

</body>
</html>
