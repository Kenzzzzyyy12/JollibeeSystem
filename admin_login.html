<!-- admin_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>


</head>

<style>
/* General body */
body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
form {
    background: #fff;
    padding: 40px 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    width: 320px;
}

/* Heading */
h1 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
    font-size: 24px;
}

/* Labels */
label {
    font-weight: bold;
    color: #555;
}

/* Inputs */
input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    margin-top: 5px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background-color: #d60000; /* Jollibee red */
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background-color: #a50000;
}

/* Responsive for smaller screens */
@media screen and (max-width: 400px) {
    form {
        width: 90%;
        padding: 30px 20px;
    }
}
</style>



<body>
<h1>Admin Login</h1>
<form action="admin_dashboard.php" method="POST">
    <label for="username">Username:</label><br>
    <input type="text" id="username" name="username" required><br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <button type="submit">Login</button>
</form>
</body>
</html>
